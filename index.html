<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>니콘 친게 뮤직 플레이어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --bg-primary: #1a1208;
    --bg-secondary: #221a0e;
    --bg-card: #2a1f0e;
    --bg-card2: #332818;
    --accent: #c8a050;
    --accent2: #e0b870;
    --accent3: #f0d090;
    --gold: #f0c040;
    --red: #c04030;
    --text: #f0e8d8;
    --text-muted: #9a8a6a;
    --text-dim: #c0a880;
    --border: #3a2a14;
    --border2: #4a3820;
    --glow: rgba(200,160,80,0.3);
    --wood: #5c3a1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(200,160,80,0.01) 2px, rgba(200,160,80,0.01) 4px),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,160,80,0.01) 2px, rgba(200,160,80,0.01) 4px);
  }

  #drop-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,18,8,0.85);
    border: 3px dashed var(--accent2);
    z-index: 9999; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; backdrop-filter: blur(4px);
  }
  #drop-overlay.active { display: flex; }
  #drop-overlay .drop-icon { font-size: 64px; }
  #drop-overlay .drop-text { font-size: 22px; font-weight: 700; color: var(--accent2); letter-spacing: 3px; font-family: 'Playfair Display', serif; }

  .app-container {
    display: flex; flex-direction: column; height: 100vh;
    background: linear-gradient(160deg, #221a0e 0%, #1a1208 40%, #140e06 100%);
  }

  .titlebar {
    height: 48px; -webkit-app-region: drag;
    display: flex; align-items: center; justify-content: center;
    padding: 0 80px; background: rgba(20,14,6,0.95);
    border-bottom: 2px solid var(--border2); flex-shrink: 0;
    position: relative;
  }
  .titlebar::before, .titlebar::after {
    content: ''; position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent));
  }
  .titlebar::before { left: 90px; }
  .titlebar::after { right: 90px; background: linear-gradient(90deg, var(--accent), transparent); }
  .titlebar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700; letter-spacing: 4px;
    color: var(--accent2); text-transform: uppercase;
  }

  .main-content { display: flex; flex: 1; overflow: hidden; }

  .left-panel {
    width: 480px; flex-shrink: 0; display: flex; flex-direction: column;
    padding: 14px; gap: 10px; border-right: 2px solid var(--border2);
    overflow-y: auto; overflow-x: hidden;
    background: linear-gradient(180deg, rgba(42,31,14,0.6) 0%, rgba(26,18,8,0.8) 100%);
  }

  .lp-section {
    background: var(--bg-card); border-radius: 12px;
    border: 1px solid var(--border2); padding: 12px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative;
    box-shadow: inset 0 1px 0 rgba(200,160,80,0.1), 0 4px 20px rgba(0,0,0,0.4);
  }
  .lp-section::before {
    content: ''; position: absolute; inset: 0; border-radius: 12px;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,160,80,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  #lp-canvas { display: block; }

  .track-info { text-align: center; width: 100%; padding: 0 8px; }
  .track-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
  }
  .track-artist { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .progress-section { width: 100%; display: flex; flex-direction: column; gap: 4px; }
  .progress-bar-wrap {
    position: relative; height: 4px; background: var(--bg-card2);
    border-radius: 2px; cursor: pointer; overflow: visible;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--wood), var(--accent), var(--accent2));
    border-radius: 2px; width: 0%; transition: width 0.1s linear;
  }
  .progress-bar-wrap:hover .progress-bar-fill::after {
    content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
    width: 10px; height: 10px; background: var(--accent2); border-radius: 50%;
    box-shadow: 0 0 8px var(--glow);
  }
  .progress-times {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
    font-family: 'Courier Prime', monospace;
  }

  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%;
  }
  .ctrl-btn {
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; padding: 8px;
  }
  .ctrl-btn:hover { color: var(--accent2); transform: scale(1.1); }
  .ctrl-btn.active { color: var(--accent); }
  .ctrl-btn svg { width: 18px; height: 18px; }
  .ctrl-btn.play-btn {
    width: 52px; height: 52px;
    background: radial-gradient(circle at 40% 35%, var(--accent2), var(--accent) 60%, var(--wood));
    color: var(--bg-primary); border-radius: 50%; padding: 0;
    box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .ctrl-btn.play-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px var(--glow); }
  .ctrl-btn.play-btn svg { width: 22px; height: 22px; }

  .volume-section {
    display: flex; align-items: center; gap: 8px; width: 100%; padding: 0 4px;
  }
  .volume-icon { color: var(--text-muted); flex-shrink: 0; }
  .volume-icon svg { width: 16px; height: 16px; }
  .slider-wrap {
    flex: 1; position: relative; height: 4px;
    background: var(--bg-card2); border-radius: 2px; cursor: pointer;
  }
  .slider-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--wood), var(--accent2));
    pointer-events: none;
  }
  input[type="range"] {
    position: absolute; inset: -8px 0; width: 100%;
    height: calc(100% + 16px); opacity: 0; cursor: pointer; margin: 0;
  }
  .volume-val {
    font-size: 11px; color: var(--text-muted);
    font-family: 'Courier Prime', monospace; min-width: 28px; text-align: right;
  }

  .vu-meter-section {
    background: var(--bg-card); border-radius: 10px;
    border: 1px solid var(--border2); padding: 10px 14px;
  }
  .vu-meter-label {
    font-size: 10px; letter-spacing: 3px; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 8px;
    font-family: 'Playfair Display', serif;
  }

  .eq-section {
    background: var(--bg-card); border-radius: 10px;
    border: 1px solid var(--border2); padding: 10px 14px;
  }
  .eq-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .eq-label {
    font-size: 10px; letter-spacing: 3px; color: var(--text-muted);
    text-transform: uppercase; font-family: 'Playfair Display', serif;
  }
  .eq-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .eq-toggle-switch {
    width: 32px; height: 18px; background: var(--bg-card2); border-radius: 9px;
    position: relative; transition: background 0.2s; border: 1px solid var(--border2);
  }
  .eq-toggle-switch.on { background: var(--accent); border-color: var(--accent2); }
  .eq-toggle-switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: var(--text); border-radius: 50%; transition: transform 0.2s;
  }
  .eq-toggle-switch.on::after { transform: translateX(14px); }
  .eq-toggle-label { font-size: 10px; color: var(--text-muted); }

  .eq-presets { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .preset-btn {
    font-size: 10px; padding: 3px 8px; border-radius: 3px;
    border: 1px solid var(--border2); background: var(--bg-card2);
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.5px;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .preset-btn.active { background: rgba(200,160,80,0.15); border-color: var(--accent); color: var(--accent2); }

  .eq-sliders {
    display: flex; gap: 6px; justify-content: space-between;
    align-items: flex-end; height: 130px; padding: 0 2px;
  }
  .eq-band { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .eq-val {
    font-size: 9px; color: var(--accent2); font-family: 'Courier Prime', monospace;
    min-width: 24px; text-align: center; height: 12px;
  }
  .eq-slider-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; width: 20px;
  }
  input[type="range"].eq-range {
    writing-mode: vertical-lr; direction: rtl;
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    width: 4px; height: 90px; background: var(--bg-card2); border-radius: 2px;
    outline: none; cursor: pointer; opacity: 1; position: relative; inset: unset;
  }
  input[type="range"].eq-range::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 2px; cursor: pointer; box-shadow: 0 0 6px var(--glow);
  }
  input[type="range"].eq-range::-webkit-slider-runnable-track {
    background: linear-gradient(180deg, var(--accent) 0%, var(--bg-card2) 100%);
    border-radius: 2px;
  }
  .eq-freq {
    font-size: 8px; color: var(--text-muted); text-align: center;
    white-space: nowrap; transform: rotate(-45deg); transform-origin: center; margin-top: 6px;
    font-family: 'Courier Prime', monospace;
  }
  .eq-actions { display: flex; gap: 6px; margin-top: 10px; }
  .eq-action-btn {
    flex: 1; padding: 5px; border-radius: 4px; border: 1px solid var(--border2);
    background: var(--bg-card2); color: var(--text-muted); font-size: 11px;
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  }
  .eq-action-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(200,160,80,0.08); }

  /* 오른쪽 패널 */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .playlist-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border2);
    background: rgba(20,14,6,0.7); flex-shrink: 0;
  }
  .playlist-title {
    font-size: 11px; letter-spacing: 4px; color: var(--text-muted);
    text-transform: uppercase; font-family: 'Playfair Display', serif;
  }
  .playlist-count {
    font-size: 12px; color: var(--accent2); font-family: 'Courier Prime', monospace;
  }
  .playlist-actions { display: flex; gap: 6px; }
  .pl-action-btn {
    background: none; border: 1px solid var(--border2); color: var(--text-muted);
    padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer;
    transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; gap: 4px;
  }
  .pl-action-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(200,160,80,0.08); }
  .pl-action-btn svg { width: 12px; height: 12px; }

  .playlist-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: var(--text-muted); padding: 40px;
  }
  .playlist-empty-icon { font-size: 52px; opacity: 0.3; }
  .playlist-empty-text {
    font-size: 14px; text-align: center; line-height: 1.8;
    color: var(--text-dim); font-family: 'Playfair Display', serif;
  }
  .playlist-empty-hint { font-size: 12px; color: var(--text-muted); opacity: 0.6; text-align: center; }

  .playlist-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .playlist-list::-webkit-scrollbar { width: 4px; }
  .playlist-list::-webkit-scrollbar-track { background: transparent; }
  .playlist-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .playlist-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .pl-item {
    display: flex; align-items: center; padding: 8px 16px; gap: 12px;
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid rgba(58,42,20,0.3);
  }
  .pl-item:hover { background: rgba(200,160,80,0.06); }
  .pl-item.active {
    background: rgba(200,160,80,0.12);
    border-left: 3px solid var(--accent);
  }
  .pl-item.active .pl-name { color: var(--accent2); }
  .pl-num {
    font-size: 11px; color: var(--text-muted); min-width: 24px;
    text-align: right; font-family: 'Courier Prime', monospace;
  }
  .pl-playing-indicator { display: none; gap: 2px; align-items: flex-end; height: 14px; min-width: 24px; justify-content: flex-end; }
  .pl-item.active .pl-num { display: none; }
  .pl-item.active .pl-playing-indicator { display: flex; }
  .pl-bar { width: 3px; background: var(--accent); border-radius: 1px; animation: eq-bar 0.8s ease infinite alternate; }
  .pl-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .pl-bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
  .pl-bar:nth-child(3) { height: 6px; animation-delay: 0.3s; }
  @keyframes eq-bar { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

  .pl-info { flex: 1; overflow: hidden; }
  .pl-name {
    font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
  }
  .pl-meta { font-size: 11px; color: var(--text-muted); }
  .pl-duration { font-size: 11px; color: var(--text-muted); font-family: 'Courier Prime', monospace; flex-shrink: 0; }
  .pl-remove {
    opacity: 0; background: none; border: none; color: var(--text-muted);
    cursor: pointer; padding: 2px; font-size: 12px; transition: all 0.2s; flex-shrink: 0;
  }
  .pl-item:hover .pl-remove { opacity: 1; }
  .pl-remove:hover { color: var(--red); }

  .spectrum-section { padding: 0 16px 8px; flex-shrink: 0; }
  #spectrum-canvas { width: 100%; height: 60px; display: block; }

  .left-panel::-webkit-scrollbar { width: 4px; }
  .left-panel::-webkit-scrollbar-track { background: transparent; }
  .left-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 1000;
    align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--bg-card); border: 1px solid var(--border2);
    border-radius: 12px; padding: 24px; width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px var(--glow);
  }
  .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--accent2); font-family: 'Playfair Display', serif; }
  .modal-input {
    width: 100%; background: var(--bg-card2); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif; margin-bottom: 16px; outline: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border2);
    background: var(--bg-card2); color: var(--text); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--accent); border-color: var(--accent2); color: var(--bg-primary); font-weight: 700; }
  .modal-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div id="drop-overlay">
  <div class="drop-icon">🎵</div>
  <div class="drop-text">음악 파일 또는 폴더를 드롭하세요</div>
</div>

<div class="app-container">
  <div class="titlebar">
    <div class="titlebar-logo">니콘 친게 뮤직 플레이어</div>
  </div>

  <div class="main-content">
    <div class="left-panel">

      <div class="lp-section">
        <div class="lp-container">
          <canvas id="lp-canvas" width="260" height="180" style="width:260px;height:180px;display:block;flex-shrink:0;"></canvas>
        </div>

        <div class="track-info">
          <div class="track-title" id="track-title">─</div>
          <div class="track-artist" id="track-artist"></div>
        </div>

        <div class="progress-section">
          <div class="progress-bar-wrap" id="progress-wrap">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <div class="progress-times">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn" id="btn-shuffle" title="랜덤 재생" onclick="window.playerAPI.toggleShuffle()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          </button>
          <button class="ctrl-btn" onclick="window.playerAPI.prevTrack()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn play-btn" id="btn-play" onclick="window.playerAPI.togglePlay()">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" onclick="window.playerAPI.nextTrack()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-repeat" onclick="window.playerAPI.toggleRepeat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>

        <div class="volume-section">
          <div class="volume-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </div>
          <div class="slider-wrap">
            <div class="slider-fill" id="vol-fill" style="width:80%"></div>
            <input type="range" min="0" max="100" value="80" id="vol-slider">
          </div>
          <span class="volume-val" id="vol-val">80</span>
        </div>
      </div>

      <div class="vu-meter-section">
        <div class="vu-meter-label">VU Meter</div>
        <canvas id="vu-canvas" style="display:block;width:100%;height:130px;"></canvas>
      </div>

      <div class="eq-section">
        <div class="eq-header">
          <span class="eq-label">12-Band Equalizer</span>
          <div class="eq-toggle" onclick="window.playerAPI.toggleEQ()">
            <div class="eq-toggle-switch" id="eq-switch"></div>
            <span class="eq-toggle-label">EQ</span>
          </div>
        </div>
        <div class="eq-presets">
          <button class="preset-btn active" data-preset="flat" onclick="window.playerAPI.setPreset('flat')">Flat</button>
          <button class="preset-btn" data-preset="rock" onclick="window.playerAPI.setPreset('rock')">Rock</button>
          <button class="preset-btn" data-preset="pop" onclick="window.playerAPI.setPreset('pop')">Pop</button>
          <button class="preset-btn" data-preset="jazz" onclick="window.playerAPI.setPreset('jazz')">Jazz</button>
          <button class="preset-btn" data-preset="classical" onclick="window.playerAPI.setPreset('classical')">Classical</button>
          <button class="preset-btn" data-preset="bass" onclick="window.playerAPI.setPreset('bass')">Bass</button>
          <button class="preset-btn" data-preset="vocal" onclick="window.playerAPI.setPreset('vocal')">Vocal</button>
          <button class="preset-btn" data-preset="electronic" onclick="window.playerAPI.setPreset('electronic')">Electronic</button>
        </div>
        <div class="eq-sliders" id="eq-sliders"></div>
        <div class="eq-actions">
          <button class="eq-action-btn" onclick="window.playerAPI.saveCustomEQ()">저장</button>
          <button class="eq-action-btn" onclick="window.playerAPI.resetEQ()">초기화</button>
        </div>
      </div>

    </div>

    <div class="right-panel">
      <div class="playlist-header">
        <span class="playlist-title">Playlist</span>
        <span class="playlist-count" id="playlist-count">0 곡</span>
        <div class="playlist-actions">
          <button class="pl-action-btn" onclick="window.playerAPI.openFiles()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            파일 추가
          </button>
          <button class="pl-action-btn" onclick="window.playerAPI.openFolder()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            폴더 추가
          </button>
          <button class="pl-action-btn" onclick="window.playerAPI.clearPlaylist()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            비우기
          </button>
        </div>
      </div>

      <div class="spectrum-section">
        <canvas id="spectrum-canvas" height="60"></canvas>
      </div>

      <div id="playlist-empty" class="playlist-empty">
        <div class="playlist-empty-icon">🎸</div>
        <div class="playlist-empty-text">플레이리스트가 비어있습니다<br>음악 파일을 추가해보세요</div>
        <div class="playlist-empty-hint">파일 추가 버튼 또는 파일/폴더를 드래그하세요</div>
      </div>

      <div class="playlist-list" id="playlist-list" style="display:none"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="save-modal">
  <div class="modal-box">
    <div class="modal-title">EQ 설정 저장</div>
    <input type="text" class="modal-input" id="preset-name-input" placeholder="프리셋 이름을 입력하세요" maxlength="30">
    <div class="modal-actions">
      <button class="modal-btn" onclick="document.getElementById('save-modal').classList.remove('open')">취소</button>
      <button class="modal-btn primary" onclick="window.playerAPI.confirmSaveEQ()">저장</button>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
